<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wizard Wars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Mode Select Screen -->
  <div id="mode-select-screen">
    <h1 class="pixel-title">WIZARD<br>WARS</h1>
    <p class="pixel-sub">Choose your battle mode</p>
    <div class="mode-buttons">
      <button class="mode-btn" id="btn-mode-pvc">
        VS BOT
        <span class="mode-desc">Face the minimax AI</span>
      </button>
      <button class="mode-btn" id="btn-mode-pvp">
        2 PLAYER
        <span class="mode-desc">Pass &amp; play locally</span>
      </button>
    </div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" style="display:none;">
    <h1 class="pixel-title">WIZARD WARS</h1>

    <div class="battlefield-wrapper">

      <!-- P1 HUD -->
      <div class="hud-side hud-left">
        <div class="hud-label" id="p1-label">PLAYER 1</div>
        <div class="hp-bar-bg blue-bar">
          <div class="hp-bar-fill" id="player-hp-fill" style="width:100%;"></div>
        </div>
        <div class="hp-text" id="player-hp-text">3 / 3</div>
        <button class="potion-btn potion-blue" id="player-potion-btn" disabled>USE POTION</button>
        <div class="potion-status blue-status" id="player-potion-status">READY</div>
      </div>

      <!-- Grid Area -->
      <div class="grid-column">
        <div class="grid-wrapper">
          <div class="grid" id="grid"></div>
          <div id="animation-layer"></div>
        </div>
      </div>

      <!-- P2 HUD -->
      <div class="hud-side hud-right">
        <div class="hud-label" id="p2-label">BOT</div>
        <div class="hp-bar-bg red-bar">
          <div class="hp-bar-fill" id="ai-hp-fill" style="width:100%;"></div>
        </div>
        <div class="hp-text" id="ai-hp-text">3 / 3</div>
        <button class="potion-btn potion-red" id="ai-potion-btn" disabled style="display:none;">USE POTION</button>
        <div class="potion-status red-status" id="ai-potion-status">READY</div>
      </div>

    </div><!-- /battlefield-wrapper -->

    <!-- Phase indicator -->
    <p class="phase-indicator" id="phase-indicator"></p>

    <!-- Action Panel -->
    <div class="action-panel" id="action-panel" style="visibility:hidden;">
      <div class="action-label">CHOOSE ACTION</div>
      <div class="action-buttons">
        <button class="action-btn btn-fire-bolt" id="btn-fire-bolt" disabled>
          FIRE BOLT<br><span class="btn-sub">1 dmg · ranged</span>
        </button>
        <button class="action-btn btn-dagger" id="btn-dagger" disabled>
          DAGGER<br><span class="btn-sub">2 dmg · adjacent</span>
        </button>
        <button class="action-btn btn-dash" id="btn-dash" disabled>
          DASH<br><span class="btn-sub">+2 extra steps</span>
        </button>
      </div>
    </div>

    <!-- Message Bar -->
    <div class="message-bar" id="message-bar">Loading...</div>

    <!-- Move Log -->
    <div class="move-log" id="move-log">
      <div class="move-log-header">TURN LOG</div>
      <div class="move-log-entries" id="move-log-entries">
        <span class="log-empty">No moves yet.</span>
      </div>
    </div>

    <!-- New Game -->
    <button class="new-game-btn" id="new-game-btn">NEW GAME</button>

    <!-- Game Over Overlay -->
    <div class="overlay" id="overlay">
      <div class="overlay-box">
        <div class="overlay-title" id="overlay-title">VICTORY!</div>
        <div class="overlay-sub" id="overlay-sub">You won!</div>
        <button class="overlay-play-btn" id="overlay-play-btn">PLAY AGAIN</button>
      </div>
    </div>

  </div><!-- /game-screen -->

  <script src="/static/game.js"></script>
</body>
</html>
